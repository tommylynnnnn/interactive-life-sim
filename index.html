<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Life Simulator</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="game-container">

    <h1>Life Simulator</h1>

    <!-- PLAYER INFO -->

    <div id="player-info" class="panel"></div>

    <!-- AGE BUTTON -->

    <div class="panel">

      <button id="age-button" onclick="ageUp()">
        Age Up
      </button>

    </div>

    <!-- RELATIONSHIPS -->

    <div id="relationships" class="panel"></div>

    <!-- JOBS -->

    <div id="jobs" class="panel"></div>

  </div>

  <script src="script.js"></script>

</body>
</html>
